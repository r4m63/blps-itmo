$kind: http-request
name: (арендодатель) подтверждение вложений
url: "{{base_url}}/api/storage/attachments/confirm"
method: POST
body:
  type: json
  content: |
    { 
        "objectKey": "{{objectKey}}" 
    }
scripts:
  - type: afterResponse
    code: |
      pm.test("200", ()=>pm.response.to.have.status(200));
      const j = pm.response.json();
      pm.environment.set("attachmentId", j.attachmentId);
    language: text/javascript
