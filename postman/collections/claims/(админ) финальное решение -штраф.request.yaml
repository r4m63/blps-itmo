$kind: http-request
name: (админ) финальное решение -штраф
url: "{{base_url}}/api/claims/{{claimId}}/support-decision"
method: POST
body:
  type: json
  content: |
    {
      "adminId": {{adminId}},
      "applyPenalty": false,
      "note": "Возражения приняты, штраф не применяем"
    }
scripts:
  - type: afterResponse
    code: |
      pm.test("200", ()=>pm.response.to.have.status(200));
      pm.test("Final status", ()=>{
        const s = pm.response.json().status;
        pm.expect(["PENALTY_APPLIED","CLOSED_NO_PENALTY"]).to.include(s);
      });
    language: text/javascript
order: 4503576421965468
