$kind: http-request
name: (админ) ИЛИ оценка ущерба - есть
url: "{{base_url}}/api/claims/{{claimId}}/assessment"
method: POST
body:
  type: json
  content: |
    {
      "adminId": {{adminId}},
      "assessmentAmount": 180.00,
      "assessmentNotes": "Сломана ножка стула, ткани не подлежат чистке",
      "penaltyGrounds": true
    }
scripts:
  - type: afterResponse
    code: |
      pm.test("200", ()=>pm.response.to.have.status(200));
      const j = pm.response.json();
      pm.environment.set("claimId", j.id);
      pm.test("Status updated", ()=>pm.expect(["AWAITING_TENANT_RESPONSE","CLOSED_NO_PENALTY"]).to.include(j.status));
    language: text/javascript
order: 4453184952589368
